<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Mundial 2026 - Selecciones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #001e3c, #0a2f44);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5rem; }
        .stats { text-align: center; margin-bottom: 20px; font-size: 1.2rem; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 50px; }
        .search { text-align: center; margin-bottom: 30px; }
        .search input {
            padding: 12px 20px;
            width: 300px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
        }
        .search button {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            background: #ffb347;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        .escudo {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .escudo img { width: 60px; height: 60px; object-fit: contain; }
        .nombre { font-size: 1.3rem; font-weight: bold; margin-bottom: 8px; }
        .confederacion {
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.8rem;
        }
        .loading, .error {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
        }
        .error { color: #ff9999; }
        footer { text-align: center; margin-top: 40px; opacity: 0.7; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽🏆 Mundial 2026 🌎</h1>
        <p style="text-align: center;">Selecciones clasificadas · USA · México · Canadá</p>
        
        <div class="stats" id="stats">Cargando...</div>
        
        <div class="search">
            <input type="text" id="searchInput" placeholder="Buscar selección..." onkeyup="filterTeams()">
            <button onclick="loadTeams()">🔄 Actualizar</button>
        </div>
        
        <div id="teamsGrid" class="grid">
            <div class="loading">⏳ Cargando selecciones desde la API...</div>
        </div>
        
        <footer>
            📡 Datos en tiempo real | API REST | Mundial 2026
        </footer>
    </div>

    <script>
        let allTeams = [];
        
        async function loadTeams() {
            const grid = document.getElementById('teamsGrid');
            const stats = document.getElementById('stats');
            
            grid.innerHTML = '<div class="loading">🌍 Conectando con la API...</div>';
            
            try {
                const response = await fetch('https://mundialapi2026.rf.gd/api/participantes.php');
                const data = await response.json();
                
                // Verificar el formato de tu API
                if (data.success && Array.isArray(data.data)) {
                    allTeams = data.data;
                    stats.innerHTML = `✅ ${allTeams.length} selecciones clasificadas al Mundial 2026`;
                    renderTeams(allTeams);
                } else {
                    throw new Error('Formato de respuesta incorrecto');
                }
            } catch (error) {
                console.error('Error:', error);
                grid.innerHTML = `<div class="error">
                    ❌ Error al cargar los datos<br>
                    <small>${error.message}</small><br><br>
                    🔧 Verifica que la API esté activa en: https://mundialapi2026.rf.gd/api/participantes.php
                </div>`;
                stats.innerHTML = '⚠️ Error de conexión';
            }
        }
        
        function renderTeams(teams) {
            const grid = document.getElementById('teamsGrid');
            
            if (teams.length === 0) {
                grid.innerHTML = '<div class="loading">🔎 No se encontraron selecciones</div>';
                return;
            }
            
            grid.innerHTML = teams.map(team => `
                <div class="card">
                    <div class="escudo">
                        ${team.escudo_url ? 
                            `<img src="${team.escudo_url}" onerror="this.src='https://placehold.co/60x60/ffb347/white?text=⚽'">` : 
                            `<div style="font-size: 2rem;">🏆</div>`
                        }
                    </div>
                    <div class="nombre">${escapeHtml(team.nombre)}</div>
                    <div class="confederacion">⚡ ${escapeHtml(team.confederacion || 'Por definir')}</div>
                    <div style="font-size: 0.7rem; margin-top: 10px; opacity: 0.7;">ID: ${team.id}</div>
                </div>
            `).join('');
        }
        
        function filterTeams() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTeams.filter(team => 
                team.nombre.toLowerCase().includes(searchTerm) ||
                (team.confederacion && team.confederacion.toLowerCase().includes(searchTerm))
            );
            renderTeams(filtered);
            document.getElementById('stats').innerHTML = `📋 ${filtered.length} de ${allTeams.length} selecciones`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Cargar al inicio
        loadTeams();
    </script>
</body>
</html>
